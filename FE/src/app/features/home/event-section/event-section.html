<section class="events-section" id="events" aria-label="Featured Events">
  <div class="section-heading">
    <h2 id="events-title">{{ 'home.eventsLike' | translate }}</h2>
    <a class="view-all" href="#">{{ 'home.viewAll' | translate }} <span class="arrow">→</span></a>
  </div>

  <div class="events-grid">
    @for (event of events; track event.title) {
      <article class="event-card">
          <p class="event-meta">{{ event.date }}</p>
          <h3 class="event-title">{{ event.title }}</h3>
          <p class="event-location">{{ event.location }}</p>
          <button type="button" class="btn-action">{{ event.buttonText || 'See Tickets' }}</button>
        </div>
      </article>
    }
  </div>
</section>
