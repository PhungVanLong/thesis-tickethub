<section class="category-section" aria-labelledby="cat-title">
  <h2 id="cat-title" class="section-title">{{ 'home.browseCategory' | translate }}</h2>
  
  <div class="category-grid">
    @for (cat of categories; track cat.name) {
      <a href="#" class="category-card" [attr.aria-label]="cat.name">
        <div class="card-image-wrapper">
          <img class="category-image" [src]="cat.image" [alt]="cat.name" />
          <div class="category-overlay"></div>
        </div>
        <span class="category-name">{{ 'category.' + cat.name | translate }}</span>
      </a>
    }
  </div>
</section>
