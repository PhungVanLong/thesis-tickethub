<section class="city-section" id="browse-cities" aria-labelledby="city-title">
  <div class="city-section__inner">
    <div class="section-heading">
      <div>
        <h2 id="city-title">Khám phá theo thành phố</h2>
        <p class="section-sub">Tìm sự kiện gần bạn nhất</p>
      </div>
      <a [routerLink]="['/explore']" class="view-all">Xem tất cả <span class="arrow">›</span></a>
    </div>

    <div class="city-grid">
      @for (city of cities; track city.name) {
        <a class="city-card"
           [routerLink]="['/explore']"
           [queryParams]="{ city: city.name }"
           [attr.aria-label]="'Khám phá sự kiện tại ' + city.name">
          <div class="city-card__img-wrap">
            <img [src]="city.image" [alt]="city.name" class="city-card__img" loading="lazy" />
            <div class="city-card__overlay"></div>
          </div>
          <div class="city-card__body">
            <span class="city-card__icon">{{ city.icon }}</span>
            <h3 class="city-card__name">{{ city.name }}</h3>
            @if (city.count) {
              <span class="city-card__badge">{{ city.count }}</span>
            }
          </div>
        </a>
      }
    </div>
  </div>
</section>
