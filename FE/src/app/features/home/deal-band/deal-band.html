<section class="deal-band" id="deals" aria-label="Featured Promotions">
  <div class="deals-grid">
    @for (deal of deals(); track deal.id) {
      <div class="deal-card" [style.background-image]="'linear-gradient(rgba(0, 0, 0, 0.15), rgba(0, 0, 0, 0.75)), url(' + deal.image + ')'">
        <div class="deal-content">
          @if (deal.eyebrow) {
            <span class="deal-eyebrow" style="background: #0052cc; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block;">
              {{ deal.eyebrow }}
            </span>
          }
          <h2 class="deal-title" style="margin-top: 8px;">{{ deal.title }}</h2>
          <a [routerLink]="['/event', deal.id]" class="deal-btn" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center; width: fit-content; padding: 10px 20px; border-radius: 4px; font-weight: 700; background: #0052cc; color: #fff; border: none; font-size: 13px; transition: background 0.2s;" onmouseover="this.style.background='#0043b3';" onmouseout="this.style.background='#0052cc';">
            Learn More
          </a>
        </div>
      </div>
    }
  </div>
</section>
