server.port=8080

spring.application.name=api-gateway
spring.output.ansi.enabled=ALWAYS

spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

# ROUTE 1: Cac API cong khai cua management service
spring.cloud.gateway.server.webflux.routes[0].id=management-public-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://management
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/events/**, /api/organizations/**

# ROUTE 2: Cac API cong khai cua Identity Service (Dang nhap / Dang ky)
spring.cloud.gateway.server.webflux.routes[1].id=identity-public-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://identity
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/auth/**

# ROUTE 3: Booking Service Routes (Dat ve, thanh toan, IPN callback)
spring.cloud.gateway.server.webflux.routes[2].id=booking-route
spring.cloud.gateway.server.webflux.routes[2].uri=lb://booking
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/bookings/**, /api/payments/**, /api/orders/**, /api/tickets/**

# ROUTE 4: Promotion Service Routes (Vouchers, khuyen mai)
spring.cloud.gateway.server.webflux.routes[3].id=promotion-route
spring.cloud.gateway.server.webflux.routes[3].uri=lb://promotion
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/vouchers/**, /api/promotions/**

# ROUTE 5: Cac API bao mat cua Identity Service (Can xac thuc va giai ma JWT - Catch all)
spring.cloud.gateway.server.webflux.routes[4].id=identity-secured-route
spring.cloud.gateway.server.webflux.routes[4].uri=lb://identity
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/**

# ROUTE openapi cho Identity Service
spring.cloud.gateway.server.webflux.routes[5].id=identity-openapi
spring.cloud.gateway.server.webflux.routes[5].uri=lb://identity
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/identity/api-docs
spring.cloud.gateway.server.webflux.routes[5].filters[0]=RewritePath=/identity/api-docs, /api-docs

# ROUTE openapi cho Management Service
spring.cloud.gateway.server.webflux.routes[6].id=management-openapi
spring.cloud.gateway.server.webflux.routes[6].uri=lb://management
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/management/api-docs
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/management/api-docs, /api-docs

# ROUTE openapi cho Booking Service
spring.cloud.gateway.server.webflux.routes[7].id=booking-openapi
spring.cloud.gateway.server.webflux.routes[7].uri=lb://booking
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/booking/api-docs
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/booking/api-docs, /api-docs

# ROUTE openapi cho Promotion Service
spring.cloud.gateway.server.webflux.routes[8].id=promotion-openapi
spring.cloud.gateway.server.webflux.routes[8].uri=lb://promotion
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/promotion/api-docs
spring.cloud.gateway.server.webflux.routes[8].filters[0]=RewritePath=/promotion/api-docs, /api-docs

# MA KHOA BI MAT NOI BO DE TRANH BYPASS GATEWAY
gateway.shared-secret=gateway-secret-signature-2026

# CAU HINH DONG BO KHOA BI MAT JWT (KHOP 100% VOI IDENTITY SERVICE)
jwt.secret=change-this-secret-key-please-change-very-long

# CAU HINH DONG BO SWAGGER UI TONG HOP
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=1. Identity Service
springdoc.swagger-ui.urls[0].url=/identity/api-docs
springdoc.swagger-ui.urls[1].name=2. Management Service
springdoc.swagger-ui.urls[1].url=/management/api-docs
springdoc.swagger-ui.urls[2].name=3. Booking Service
springdoc.swagger-ui.urls[2].url=/booking/api-docs
springdoc.swagger-ui.urls[3].name=4. Promotion Service
springdoc.swagger-ui.urls[3].url=/promotion/api-docs

# CAU HINH PATHS CONG KHAI KHONG CAN JWT
gateway.security.public-paths=/api/auth/**,/api/events/**,/api/bookings/stream/**,/api/bookings/vnpay-return,/swagger-ui.html,/swagger-ui/**,/v3/api-docs/**,/identity/api-docs,/management/api-docs,/booking/api-docs,/promotion/api-docs

# CAU HINH DIA CHI TRO VE EUREKA SERVER TRUNG TAM
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# CAU HINH LOGS CHI TIET CHO API GATEWAY
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.http.server.reactive=DEBUG
logging.level.reactor.netty.http.client=DEBUG