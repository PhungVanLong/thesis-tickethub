server.port=8080

spring.application.name=api-gateway


spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true
spring.cloud.gateway.server.webflux.discovery.locator.enabled=true

# ROUTE 1: Cac API cong khai cua management service
spring.cloud.gateway.server.webflux.routes[0].id=management-public-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://management
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/events/**

# ROUTE 2: Cac API cong khai cua Identity Service (Dang nhap / Dang ky)
spring.cloud.gateway.server.webflux.routes[1].id=identity-public-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://identity
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/auth/login, /api/auth/register

# ROUTE 3: Booking Service Routes (Dat ve, thanh toan, IPN callback)
spring.cloud.gateway.server.webflux.routes[2].id=booking-route
spring.cloud.gateway.server.webflux.routes[2].uri=lb://booking
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/bookings/**, /api/payments/**

# ROUTE 4: Promotion Service Routes (Vouchers, khuyen mai)
spring.cloud.gateway.server.webflux.routes[3].id=promotion-route
spring.cloud.gateway.server.webflux.routes[3].uri=lb://promotion
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/vouchers/**, /api/promotions/**

# ROUTE 5: Cac API bao mat cua Identity Service (Can xac thuc va giai ma JWT - Catch all)
spring.cloud.gateway.server.webflux.routes[4].id=identity-secured-route
spring.cloud.gateway.server.webflux.routes[4].uri=lb://identity
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/**

# MA KHOA BI MAT NOI BO DE TRANH BYPASS GATEWAY
gateway.shared-secret=gateway-secret-signature-2026

# CAU HINH DONG BO KHOA BI MAT JWT (KHOP 100% VOI IDENTITY SERVICE)
jwt.secret=change-this-secret-key-please-change-very-long

gateway.security.public-paths=/api/auth/**,/api/events/**

# CAU HINH DIA CHI TRO VE EUREKA SERVER TRUNG TAM
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true